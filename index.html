<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Primary Chinese 听写 Trainer</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 550px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        h1 {
            font-size: 1.6rem;
            margin: 5px 0 2px 0;
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-light);
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        /* Filter Tabs */
        .filter-group {
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        button.filter-btn {
            background-color: #e2e8f0;
            border: none;
            color: var(--text-dark);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        button.filter-btn.active {
            background-color: var(--primary);
            color: white;
        }

        /* Main Workspace Card */
        .workspace-card {
            background-color: var(--card-bg);
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        /* Top Bar: Play audio, Hint, Status */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid #f1f5f9;
        }

        .action-btn {
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background-color: #e2e8f0;
        }

        .audio-btn {
            background-color: #e0e7ff;
            color: var(--primary);
            border-color: #c7d2fe;
        }

        .audio-btn:hover {
            background-color: #c7d2fe;
        }

        /* Drawing Canvas Area */
        .canvas-container {
            position: relative;
            width: 100%;
            height: 220px;
            background-color: #fff;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            touch-action: none;
        }

        /* Calligraphy background grid */
        .canvas-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to bottom, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%),
                linear-gradient(to right, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%),
                linear-gradient(135deg, transparent 49.5%, #fee2e2 49.5%, #fee2e2 50.5%, transparent 50.5%),
                linear-gradient(45deg, transparent 49.5%, #fee2e2 49.5%, #fee2e2 50.5%, transparent 50.5%);
            pointer-events: none;
            opacity: 0.6;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .canvas-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -4px;
        }

        /* Secret Hint display */
        .hint-box {
            display: none;
            background-color: #fef08a;
            border: 1px solid #fef08a;
            color: #713f12;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
        }

        /* Hidden/Reveal Target Character Display */
        .reveal-box {
            display: none;
            flex-direction: column;
            gap: 10px;
            background-color: #f0fdf4;
            border: 2px solid #bbf7d0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .target-character {
            font-size: 3rem;
            font-weight: bold;
            color: #166534;
            letter-spacing: 4px;
        }

        .target-pinyin {
            font-size: 1.2rem;
            color: var(--primary);
            font-weight: bold;
        }

        .target-translation {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* Navigation */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .nav-btn {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background-color: #f1f5f9;
        }

        .counter {
            font-weight: 600;
            color: var(--text-light);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>听写练习 Dictation</h1>
    <p class="subtitle">Draw or write down the word matching the spoken audio!</p>

    <!-- Filter by Syllabus/Worksheet -->
    <div class="filter-group">
        <button class="filter-btn active" onclick="setWorksheet('WS10')">听写十</button>
        <button class="filter-btn" onclick="setWorksheet('WS11')">听写十一</button>
        <button class="filter-btn" onclick="setWorksheet('WS12')">听写十二</button>
        <button class="filter-btn" onclick="setWorksheet('WS13')">听写十三</button>
    </div>

    <!-- Active Card Arena -->
    <div class="workspace-card">
        <div class="card-header">
            <button class="action-btn audio-btn" onclick="playAudio()" id="speak-trigger">
                🔊 Play Word
            </button>
            <button class="action-btn" onclick="toggleHint()" id="hint-trigger">
                💡 Hint
            </button>
            <button class="action-btn" onclick="revealAnswer()" id="reveal-trigger" style="background-color: #bbf7d0; border-color: #86efac; color: #166534;">
                👁️ Reveal
            </button>
        </div>

        <!-- Hint Overlay -->
        <div class="hint-box" id="hint-box">
            <strong>Hint:</strong> <span id="hint-text">Pinyin / Translation</span>
        </div>

        <!-- Drawing Canvas Area -->
        <div class="canvas-container" id="canvas-container">
            <canvas id="paint-canvas"></canvas>
        </div>

        <div class="canvas-controls">
            <button class="action-btn" onclick="reshuffleCurrentWorksheet()" style="background-color: #f1f5f9; border-color: #cbd5e1; color: var(--text-dark);">
                🔀 Reshuffle List
            </button>
            <button class="action-btn" onclick="clearCanvas()" style="background-color: #fee2e2; border-color: #fca5a5; color: var(--accent);">
                🧹 Clear Pad
            </button>
        </div>

        <!-- Answer Panel (Initially Hidden) -->
        <div class="reveal-box" id="reveal-box">
            <div class="target-character" id="reveal-char">--</div>
            <div class="target-pinyin" id="reveal-pinyin">--</div>
            <div class="target-translation" id="reveal-translation">--</div>
        </div>
    </div>

    <!-- Navigation Footer -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="prevWord()">← Previous</button>
        <span class="counter" id="tracker">Word 1 of 16</span>
        <button class="nav-btn" onclick="nextWord()">Next →</button>
    </div>
</div>

<script>
    // Worksheet Database (Updated to new sheets 10-13)
    const syllabusDatabase = {
        'WS10': [
            { word: '玩耍', pinyin: 'wán shuǎ', english: 'To play / sports / amuse oneself', type: 'word' },
            { word: '有礼貌', pinyin: 'yǒu lǐ mào', english: 'Polite / Courteous', type: 'word' },
            { word: '炒米粉', pinyin: 'chǎo mǐ fěn', english: 'Fried rice vermicelli', type: 'word' },
            { word: '占位子', pinyin: 'zhàn wèi zi', english: 'Occupy a seat / Chope place', type: 'word' },
            { word: '互相帮助', pinyin: 'hù xiāng bāng zhù', english: 'Help each other', type: 'word' },
            { word: '大喊大叫', pinyin: 'dà hǎn dà jiào', english: 'Shouting and screaming', type: 'word' },
            { word: '清洁工人', pinyin: 'qīng jié gōng rén', english: 'Cleaner / Sanitation worker', type: 'word' },
            { word: '推开大门', pinyin: 'tuī kāi dà mén', english: 'Push open the main door', type: 'word' },
            { word: '水洒了一地', pinyin: 'shuǐ sǎ le yī dì', english: 'Water spilled all over the floor', type: 'word' },
            { word: '显得', pinyin: 'xiǎn de', english: 'To appear / look / seem', type: 'usage' },
            { word: '不管', pinyin: 'bù guǎn', english: 'No matter / regardless of', type: 'usage' },
            { word: '无礼', pinyin: 'wú lǐ', english: 'Rude / Impolite', type: 'usage' },
            { word: '不肯', pinyin: 'bù kěn', english: 'Refuse to / unwilling to', type: 'usage' },
            { word: '理睬', pinyin: 'lǐ cǎi', english: 'Pay attention to / show interest in', type: 'usage' },
            { word: '不耐烦', pinyin: 'bú nài fán', english: 'Impatient', type: 'usage' },
            { word: '她高兴得满脸通红，两只又圆又亮的眼睛，闪着光芒。', pinyin: 'tā gāo xìng de mǎn liǎn tōng hóng, liǎng zhī yòu yuán yòu liàng de yǎn jing, shǎn zhe guāng máng.', english: 'She was so happy her face flushed red, and her two round, bright eyes shone with radiance.', type: 'sentence' }
        ],
        'WS11': [
            { word: '乐曲', pinyin: 'yuè qǔ', english: 'Musical composition / tune', type: 'word' },
            { word: '奔跑', pinyin: 'bēn pǎo', english: 'To run quickly / gallop', type: 'word' },
            { word: '年级', pinyin: 'nián jí', english: 'Grade / Year level in school', type: 'word' },
            { word: '领奖台', pinyin: 'lǐng jiǎng tái', english: 'Award podium', type: 'word' },
            { word: '大声欢呼', pinyin: 'dà shēng huān hū', english: 'Cheer loudly', type: 'word' },
            { word: '到达终点', pinyin: 'dào dá zhōng diǎn', english: 'Reach the finish line', type: 'word' },
            { word: '计时开始', pinyin: 'jì shí kāi shǐ', english: 'Timing starts / Start counting time', type: 'word' },
            { word: '发出指令', pinyin: 'fā chū zhǐ lìng', english: 'Issue orders / commands', type: 'word' },
            { word: '既', pinyin: 'jì', english: 'Both / As well as / Already', type: 'usage' },
            { word: '焦虑', pinyin: 'jiāo lǜ', english: 'Anxious / Apprehensive', type: 'usage' },
            { word: '挥动', pinyin: 'huī dòng', english: 'To wave / swing', type: 'usage' },
            { word: '取得', pinyin: 'qǔ dé', english: 'To obtain / acquire / achieve', type: 'usage' },
            { word: '优秀', pinyin: 'yóu xiù', english: 'Excellent / Outstanding', type: 'usage' },
            { word: '不顾一切', pinyin: 'bú gù yī qiè', english: 'Recklessly / Regardless of everything', type: 'usage' },
            { word: '我听了，高兴得一蹦三尺高，不禁欢呼起来。', pinyin: 'wǒ tīng le, gāo xìng de yī bèng sān chǐ gāo, bù jīn huān hū qǐ lái.', english: 'Hearing it, I leaped high in the air out of joy, and couldn\'t help but cheer aloud.', type: 'sentence' }
        ],
        'WS12': [
            { word: '商店', pinyin: 'shāng diàn', english: 'Shop / Store', type: 'word' },
            { word: '植物园', pinyin: 'zhí wù yuán', english: 'Botanical Gardens', type: 'word' },
            { word: '士兵', pinyin: 'shì bīng', english: 'Soldier', type: 'word' },
            { word: '看展览', pinyin: 'kàn zhǎn lǎn', english: 'View an exhibition', type: 'word' },
            { word: '旅游景点', pinyin: 'lǚ yóu jǐng diǎn', english: 'Tourist attraction', type: 'word' },
            { word: '东南西北', pinyin: 'dōng nán xī běi', english: 'East, South, West, North (All directions)', type: 'word' },
            { word: '露出微笑', pinyin: 'lù chū wēi xiào', english: 'Reveal a smile', type: 'word' },
            { word: '围', pinyin: 'wéi', english: 'To surround / encircle / wrap around', type: 'usage' },
            { word: '纪念', pinyin: 'jì niàn', english: 'To commemorate / Souvenir', type: 'usage' },
            { word: '握', pinyin: 'wò', english: 'To hold / grip / shake hands', type: 'usage' },
            { word: '度过', pinyin: 'dù guò', english: 'To spend time / pass time', type: 'usage' },
            { word: '充实', pinyin: 'chōng shí', english: 'Fulfilling / Rich / Meaningful', type: 'usage' },
            { word: '一阵', pinyin: 'yī zhèn', english: 'A burst / spell / period of time', type: 'usage' },
            { word: '我紧张得张开了嘴巴，呆呆地站在那儿，心里忐忑不安。', pinyin: 'wǒ jǐn zhāng de zhāng kāi le zuǐ ba, dāi dāi de zhàn zài nàr, xīn lǐ tǎn tè bù ān.', english: 'I was so nervous my mouth hung open, standing there blankly, with an uneasy heart.', type: 'sentence' }
        ],
        'WS13': [
            { word: '猴子', pinyin: 'hóu zi', english: 'Monkey', type: 'word' },
            { word: '男孩', pinyin: 'nán hái', english: 'Boy', type: 'word' },
            { word: '花盆', pinyin: 'huā pén', english: 'Flowerpot', type: 'word' },
            { word: '一文', pinyin: 'yī zhàng', english: 'One Zhang (Measurement unit / a high height / depth)', type: 'word' },
            { word: '老婆婆', pinyin: 'lǎo pó po', english: 'Old lady / Granny', type: 'word' },
            { word: '一扇门', pinyin: 'yí shàn mén', english: 'A door', type: 'word' },
            { word: '摸着宝贝', pinyin: 'mō zhe bǎo bèi', english: 'Touching the treasure', type: 'word' },
            { word: '怒气冲冲', pinyin: 'nù qì chōng chōng', english: 'Furious / In a towering rage', type: 'word' },
            { word: '拆开礼物', pinyin: 'chāi kāi lǐ wù', english: 'Unwrap a gift', type: 'word' },
            { word: '费了九牛二虎之力', pinyin: 'fèi le jiǔ niú èr hǔ zhī lì', english: 'Exert tremendous effort / Herculean effort', type: 'word' },
            { word: '承认', pinyin: 'chéng rèn', english: 'To admit / acknowledge / confess', type: 'usage' },
            { word: '挑选', pinyin: 'tiāo xuǎn', english: 'To select / choose out', type: 'usage' },
            { word: '特别', pinyin: 'tè bié', english: 'Special / Unique / Especially', type: 'usage' },
            { word: '本领', pinyin: 'běn lǐng', english: 'Skill / Ability / Capability', type: 'usage' },
            { word: '立刻', pinyin: 'lì kè', english: 'Immediately / Right away', type: 'usage' },
            { word: '自言自语', pinyin: 'zì yán zì yǔ', english: 'Talk to oneself / Soliloquize', type: 'usage' },
            { word: '我的心里羞愧极了，像有无数的拳头在打我的心。', pinyin: 'wǒ de xīn lǐ xiū kuì jí le, xiàng yǒu wú shù de quán tou zài dǎ wǒ de xīn.', english: 'My heart was filled with intense shame, as if countless fists were pounding inside it.', type: 'sentence' }
        ]
    };

    let activeSheet = 'WS10';
    let currentIdx = 0;
    let list = [];

    const canvas = document.getElementById('paint-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        clearCanvas();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function startDraw(e) {
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#1e293b';
    }

    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    function stopDraw() {
        drawing = false;
        ctx.closePath();
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw);

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function setWorksheet(sheetName) {
        activeSheet = sheetName;
        currentIdx = 0;
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.getAttribute('onclick').includes(sheetName)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        list = shuffleArray(syllabusDatabase[activeSheet]);
        loadWord();
    }

    function reshuffleCurrentWorksheet() {
        currentIdx = 0;
        list = shuffleArray(syllabusDatabase[activeSheet]);
        loadWord();
    }

    function loadWord() {
        if (list.length === 0) return;
        const item = list[currentIdx];

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('reveal-box').style.display = 'none';
        clearCanvas();

        document.getElementById('hint-text').innerHTML = `<strong>${item.pinyin}</strong> — ${item.english}`;
        document.getElementById('reveal-char').textContent = item.word;
        document.getElementById('reveal-pinyin').textContent = item.pinyin;
        document.getElementById('reveal-translation').textContent = item.english;

        if(item.type === 'sentence') {
            document.getElementById('reveal-char').style.fontSize = '1.6rem';
        } else {
            document.getElementById('reveal-char').style.fontSize = '3rem';
        }

        document.getElementById('tracker').textContent = `${currentIdx + 1} of ${list.length}`;

        setTimeout(playAudio, 400);
    }

    function playAudio() {
        const item = list[currentIdx];
        if (!item) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(item.word);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.75;
        window.speechSynthesis.speak(utterance);
    }

    function toggleHint() {
        const hintBox = document.getElementById('hint-box');
        hintBox.style.display = hintBox.style.display === 'none' ? 'block' : 'none';
    }

    function revealAnswer() {
        const revealBox = document.getElementById('reveal-box');
        revealBox.style.display = 'flex';
        revealBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function nextWord() {
        if (currentIdx < list.length - 1) {
            currentIdx++;
            loadWord();
        }
    }

    function prevWord() {
        if (currentIdx > 0) {
            currentIdx--;
            loadWord();
        }
    }

    window.addEventListener('load', () => {
        resizeCanvas();
        setWorksheet('WS10');
    });
    window.addEventListener('resize', resizeCanvas);
</script>

</body>
</html>
