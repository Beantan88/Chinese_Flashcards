<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Primary Chinese 听写 Trainer</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 550px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        h1 {
            font-size: 1.6rem;
            margin: 5px 0 2px 0;
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-light);
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        /* Filter Tabs */
        .filter-group {
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        button.filter-btn {
            background-color: #e2e8f0;
            border: none;
            color: var(--text-dark);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        button.filter-btn.active {
            background-color: var(--primary);
            color: white;
        }

        /* Main Workspace Card */
        .workspace-card {
            background-color: var(--card-bg);
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        /* Top Bar: Play audio, Hint, Status */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid #f1f5f9;
        }

        .action-btn {
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background-color: #e2e8f0;
        }

        .audio-btn {
            background-color: #e0e7ff;
            color: var(--primary);
            border-color: #c7d2fe;
        }

        .audio-btn:hover {
            background-color: #c7d2fe;
        }

        /* Drawing Canvas Area */
        .canvas-container {
            position: relative;
            width: 100%;
            height: 220px;
            background-color: #fff;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            touch-action: none; /* Prevents scrolling while drawing */
        }

        /* Calligraphy background grid */
        .canvas-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to bottom, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%),
                linear-gradient(to right, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%),
                linear-gradient(135deg, transparent 49.5%, #fee2e2 49.5%, #fee2e2 50.5%, transparent 50.5%),
                linear-gradient(45deg, transparent 49.5%, #fee2e2 49.5%, #fee2e2 50.5%, transparent 50.5%);
            pointer-events: none;
            opacity: 0.6;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .canvas-controls {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: -4px;
        }

        /* Secret Hint display */
        .hint-box {
            display: none;
            background-color: #fef08a;
            border: 1px solid #fef08a;
            color: #713f12;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
        }

        /* Hidden/Reveal Target Character Display */
        .reveal-box {
            display: none;
            flex-direction: column;
            gap: 10px;
            background-color: #f0fdf4;
            border: 2px solid #bbf7d0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .target-character {
            font-size: 3rem;
            font-weight: bold;
            color: #166534;
            letter-spacing: 4px;
        }

        .target-pinyin {
            font-size: 1.2rem;
            color: var(--primary);
            font-weight: bold;
        }

        .target-translation {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* Navigation */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .nav-btn {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background-color: #f1f5f9;
        }

        .counter {
            font-weight: 600;
            color: var(--text-light);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>听写练习 Dictation</h1>
    <p class="subtitle">Draw or write down the word matching the spoken audio!</p>

    <!-- Filter by Syllabus/Worksheet -->
    <div class="filter-group">
        <button class="filter-btn active" onclick="setWorksheet('WS3')">听写 (三) 妈妈，对不起</button>
        <button class="filter-btn" onclick="setWorksheet('WS4')">听写 (四) 今天我值日</button>
    </div>

    <!-- Active Card Arena -->
    <div class="workspace-card">
        <div class="card-header">
            <button class="action-btn audio-btn" onclick="playAudio()" id="speak-trigger">
                🔊 Play Word
            </button>
            <button class="action-btn" onclick="toggleHint()" id="hint-trigger">
                💡 Hint
            </button>
            <button class="action-btn" onclick="revealAnswer()" id="reveal-trigger" style="background-color: #bbf7d0; border-color: #86efac; color: #166534;">
                👁️ Reveal
            </button>
        </div>

        <!-- Hint Overlay -->
        <div class="hint-box" id="hint-box">
            <strong>Hint:</strong> <span id="hint-text">Pinyin / Translation</span>
        </div>

        <!-- Drawing Canvas Area -->
        <div class="canvas-container" id="canvas-container">
            <canvas id="paint-canvas"></canvas>
        </div>

        <div class="canvas-controls">
            <button class="action-btn" onclick="clearCanvas()" style="background-color: #fee2e2; border-color: #fca5a5; color: var(--accent);">
                🧹 Clear Pad
            </button>
        </div>

        <!-- Answer Panel (Initially Hidden) -->
        <div class="reveal-box" id="reveal-box">
            <div class="target-character" id="reveal-char">--</div>
            <div class="target-pinyin" id="reveal-pinyin">--</div>
            <div class="target-translation" id="reveal-translation">--</div>
        </div>
    </div>

    <!-- Navigation Footer -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="prevWord()">← Previous</button>
        <span class="counter" id="tracker">Word 1 of 15</span>
        <button class="nav-btn" onclick="nextWord()">Next →</button>
    </div>
</div>

<script>
    // 100% accurate transcription of Worksheet 3 & Worksheet 4
    const syllabusDatabase = {
        'WS3': [
            { word: '街上', pinyin: 'jiē shang', english: 'On the street', type: 'word' },
            { word: '警察', pinyin: 'jǐng chá', english: 'Police / Policeman', type: 'word' },
            { word: '煮饭', pinyin: 'zhǔ fàn', english: 'To cook rice / meals', type: 'word' },
            { word: '补习', pinyin: 'bǔ xí', english: 'Tuition / Supplementary classes', type: 'word' },
            { word: '半夜', pinyin: 'bàn yè', english: 'Midnight / Middle of the night', type: 'word' },
            { word: '流下眼泪', pinyin: 'liú xià yǎn lèi', english: 'Shed tears / Start crying', type: 'word' },
            { word: '睁开眼睛', pinyin: 'zhēng kāi yǎn jing', english: 'Open one\'s eyes', type: 'word' },
            { word: '一碗云吞面', pinyin: 'yī wǎn yún tūn miàn', english: 'A bowl of wanton noodles', type: 'word' },
            { word: '脾气', pinyin: 'pí qì', english: 'Temper', type: 'usage' },
            { word: '尊敬', pinyin: 'zūn jìng', english: 'To respect / revere', type: 'usage' },
            { word: '长辈', pinyin: 'zhǎng bèi', english: 'Elders / Older generations', type: 'usage' },
            { word: '舍不得', pinyin: 'shě bù de', english: 'Loath to part with / Reluctant to leave', type: 'usage' },
            { word: '后悔', pinyin: 'hòu huǐ', english: 'To regret', type: 'usage' },
            { word: '迷上', pinyin: 'mí shàng', english: 'Obsessed with / Addicted to', type: 'usage' },
            { word: '健文挥动着手臂，十分激动，大声地说。', pinyin: 'jiàn wén huī dòng zhe shǒu bì, shí fēn jī dòng, dà shēng de shuō.', english: 'Jianwen waved his arm, very excited, and said loudly.', type: 'sentence' }
        ],
        'WS4': [
            { word: '值日生', pinyin: 'zhí rì shēng', english: 'Student on duty', type: 'word' },
            { word: '插队', pinyin: 'chā duì', english: 'Jump queue / Cut in line', type: 'word' },
            { word: '安静', pinyin: 'ān jìng', english: 'Quiet', type: 'word' },
            { word: '注意安全', pinyin: 'zhù yì ān quán', english: 'Pay attention to safety / Stay safe', type: 'word' },
            { word: '皱着眉头', pinyin: 'zhòu zhe méi tóu', english: 'Frowning', type: 'word' },
            { word: '归还碗盘', pinyin: 'guī huán wǎn pán', english: 'Return bowls and plates', type: 'word' },
            { word: '干净的食堂', pinyin: 'gān jìng de shí táng', english: 'Clean canteen', type: 'word' },
            { word: '难为情', pinyin: 'nán wéi qíng', english: 'Embarrassed', type: 'usage' },
            { word: '影响', pinyin: 'yǐng xiǎng', english: 'To influence / affect', type: 'usage' },
            { word: '责任感', pinyin: 'zé rèn gǎn', english: 'Sense of responsibility', type: 'usage' },
            { word: '提醒', pinyin: 'tí xǐng', english: 'To remind', type: 'usage' },
            { word: '由于', pinyin: 'yóu yú', english: 'Due to / because of', type: 'usage' },
            { word: '保证', pinyin: 'bǎo zhèng', english: 'To guarantee / promise', type: 'usage' },
            { word: '妈妈心中的怒火像火山一样喷发出来，她严厉地瞪着健文。', pinyin: 'mā ma xīn zhōng de nù huǒ xiàng huǒ shān yī yàng pēn fā chū lái, tā yán lì de dèng zhe jiàn wén.', english: 'The anger in mother\'s heart erupted like a volcano, and she stared sternly at Jianwen.', type: 'sentence' }
        ]
    };

    let activeSheet = 'WS3';
    let currentIdx = 0;
    let list = [];

    // Drawing Canvas Config
    const canvas = document.getElementById('paint-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Resize canvas based on layout dimensions
    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        clearCanvas();
    }

    // Capture stroke drawing coordinates
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function startDraw(e) {
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#1e293b';
    }

    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    function stopDraw() {
        drawing = false;
        ctx.closePath();
    }

    // Configure Listeners for Mouse and Touch (Tablets/Phones)
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw);

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // App Navigation Control Logic
    function setWorksheet(sheetName) {
        activeSheet = sheetName;
        currentIdx = 0;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.outerHTML.includes(sheetName)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        loadWord();
    }

    function loadWord() {
        list = syllabusDatabase[activeSheet];
        const item = list[currentIdx];

        // Hide hint and answer panels
        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('reveal-box').style.display = 'none';
        clearCanvas();

        // Populate hidden details
        document.getElementById('hint-text').innerHTML = `<strong>${item.pinyin}</strong> — ${item.english}`;
        document.getElementById('reveal-char').textContent = item.word;
        document.getElementById('reveal-pinyin').textContent = item.pinyin;
        document.getElementById('reveal-translation').textContent = item.english;

        // Auto adjusting sizing for long dictation sentences
        if(item.type === 'sentence') {
            document.getElementById('reveal-char').style.fontSize = '1.6rem';
        } else {
            document.getElementById('reveal-char').style.fontSize = '3rem';
        }

        // Update Tracker Progress
        document.getElementById('tracker').textContent = `${currentIdx + 1} of ${list.length}`;

        // Auto vocalize the word immediately
        setTimeout(playAudio, 400);
    }

    function playAudio() {
        const item = list[currentIdx];
        if (!item) return;

        window.speechSynthesis.cancel(); // kill overlapping voice cues
        const utterance = new SpeechSynthesisUtterance(item.word);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.75; // Slower cadence so child can listen closely to characters
        window.speechSynthesis.speak(utterance);
    }

    function toggleHint() {
        const hintBox = document.getElementById('hint-box');
        hintBox.style.display = hintBox.style.display === 'none' ? 'block' : 'none';
    }

    function revealAnswer() {
        const revealBox = document.getElementById('reveal-box');
        revealBox.style.display = 'flex';
        // Auto scroll to make revealed word visible
        revealBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function nextWord() {
        if (currentIdx < list.length - 1) {
            currentIdx++;
            loadWord();
        }
    }

    function prevWord() {
        if (currentIdx > 0) {
            currentIdx--;
            loadWord();
        }
    }

    // Initialize setup
    window.addEventListener('load', () => {
        resizeCanvas();
        setWorksheet('WS3');
    });
    window.addEventListener('resize', resizeCanvas);
</script>

</body>
</html>
